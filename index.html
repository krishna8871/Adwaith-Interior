<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adwaith Quotes</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f1f5f9">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/kGQ36PN4/Adwaith-Interiors.png">
    
    <style>
        /* Removes all margins so the app touches the edges of the phone screen */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f1f5f9;
        }
        /* Makes the Google Script take up 100% of the screen seamlessly */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbwcgoZY79LT12TO9UEMUxaIEbKunguqVVFkErY5akFMoR-WVrt87U1TnkuHF6buis9sDg/exec"></iframe>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log('Service Worker registered'))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }
    </script>

</body>
</html>
